name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  statuses: write

jobs:
  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Super-Linter needs full history to compute the diff against the
          # default branch when running on a PR.
          fetch-depth: 0

      - name: Run Super-Linter
        uses: super-linter/super-linter/slim@v8
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          # The relevant linters for this project. Anything not listed is
          # implicitly disabled — keeps the run fast and signal-to-noise high.
          VALIDATE_POWERSHELL: true
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true
          VALIDATE_GITLEAKS: true
          VALIDATE_GITHUB_ACTIONS: true
          # Output filter — only print findings, not the per-file pass log.
          LOG_LEVEL: WARN
