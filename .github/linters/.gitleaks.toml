# gitleaks config — extends the default ruleset, adds allowlists for
# files that are synthetic by design.
#
# See https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[[allowlists]]
description = "Synthetic sample CSV — fake-but-realistic GUIDs that look like Microsoft Purview SensitiveInfoType IDs (which are public identifiers, not secrets) trigger the generic-api-key rule on entropy alone."
paths = [
    '''examples/items_all\.sample\.csv'''
]
